# Local development dependencies ONLY — a Postgres and a Redis you can point
# local dev at. This is NOT a self-hosted Kakunin: the platform also needs
# AWS KMS, S3 Object-Lock, Supabase (auth/RLS), QStash, Stripe, and more,
# which have no local equivalents that preserve Kakunin's security properties.
# See the README "Self-hosting & local development" section.
#
#   docker compose -f docker-compose.dev.yml up -d
#
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kakunin
      POSTGRES_PASSWORD: kakunin
      POSTGRES_DB: kakunin
    ports:
      - "5432:5432"
    volumes:
      - kakunin_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kakunin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kakunin_pgdata:
