name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    env:
      # Test Supabase project (separate from dev/prod)
      TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      TEST_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      TEST_TENANT_A_ID: ${{ secrets.TEST_TENANT_A_ID }}
      TEST_TENANT_B_ID: ${{ secrets.TEST_TENANT_B_ID }}
      TEST_TENANT_A_JWT: ${{ secrets.TEST_TENANT_A_JWT }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit & Integration Tests (with coverage)
        run: npm run test:coverage -- --reporter=verbose

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 14

      - name: Security (RLS isolation)
        run: npm run test -- __tests__/security/ --reporter=verbose
